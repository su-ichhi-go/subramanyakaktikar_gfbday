<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="More Memories">
<meta name="theme-color" content="#FFE6F0">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="Interactive poker card photo gallery">
<title>More Memories — Poker Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & TOKENS
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rose: #FFB6C1;
  --deep-rose: #FF4B93;
  --pink: #FF69B4;
  --lavender: #E6D6FF;
  --purple: #C8A4F5;
  --deep-purple: #7c2c6d;
  --text: #3d123b;
  --bg-gradient: linear-gradient(145deg, #fff8f0 0%, #f8e5fa 45%, #f1f3ff 100%);
  --shadow: 0 24px 60px rgba(108, 42, 82, 0.16);
  --shadow-lg: 0 30px 80px rgba(0,0,0,0.22);
}

html, body {
  height: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--bg-gradient);
  color: var(--text);
  /* Disable callout & selection for drag targets, but NOT text content */
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ============================================================
   REUSABLE INTERACTIVE BUTTON COMPONENT
   ============================================================ */
.btn-interactive {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;          /* ripple containment */
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 1rem;
  min-height: 48px;          /* WCAG touch target */
  min-width: 48px;
  padding: 0.95rem 1.9rem;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  outline: none;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 0.18s ease,
              opacity 0.15s ease;
  will-change: transform;
  /* Prevent ghost tap delay on iOS */
  -webkit-touch-callout: none;
}

/* Primary variant */
.btn-interactive.btn-primary {
  background: linear-gradient(135deg, rgba(255,182,193,0.95), rgba(200,164,245,0.95));
  color: #4a0331;
  box-shadow: 0 8px 28px rgba(255,107,157,0.25);
}

/* Secondary variant */
.btn-interactive.btn-secondary {
  background: rgba(255,255,255,0.95);
  color: #aa1f74;
  border: 1px solid rgba(255,182,193,0.8);
  box-shadow: 0 4px 16px rgba(255,107,157,0.1);
}

/* Ghost variant (inline link-style) */
.btn-interactive.btn-ghost {
  background: transparent;
  color: var(--deep-purple);
  border: 1px solid rgba(124,44,109,0.25);
}

/* Active / press state — works on ALL platforms */
.btn-interactive:active,
.btn-interactive[data-pressed="true"] {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(255,107,157,0.15);
}

/* Hover — desktop only */
@media (hover: hover) and (pointer: fine) {
  .btn-interactive:hover {
    transform: translateY(-2px) scale(1.01);
  }
  .btn-interactive.btn-primary:hover {
    box-shadow: 0 14px 36px rgba(255,107,157,0.35);
  }
  .btn-interactive.btn-secondary:hover,
  .btn-interactive.btn-ghost:hover {
    background: rgba(255,182,193,0.12);
    transform: translateY(-1px);
  }
}

/* Focus-visible keyboard ring */
.btn-interactive:focus-visible {
  outline: 2px solid #FF69B4;
  outline-offset: 3px;
}

/* Disabled state */
.btn-interactive:disabled,
.btn-interactive[aria-disabled="true"] {
  opacity: 0.45;
  pointer-events: none;
  cursor: not-allowed;
}

/* Ripple element injected by JS */
.btn-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  transform: scale(0);
  animation: rippleAnim 0.5s linear forwards;
  pointer-events: none;
  will-change: transform, opacity;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* ============================================================
   PAGE LAYOUT
   ============================================================ */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1.5rem 3rem;
  gap: 1.5rem;
  text-align: center;
}

.page-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(2.2rem, 6vw, 3.6rem);
  color: var(--deep-rose);
  letter-spacing: 0.02em;
  text-shadow: 0 10px 30px rgba(255,182,193,0.25);
}

.description {
  max-width: 720px;
  font-size: clamp(1rem, 2.3vw, 1.2rem);
  line-height: 1.9;
  color: #4d2356;
  margin: 0 auto;
}

/* ============================================================
   DECK & CARDS
   ============================================================ */
.deck {
  width: min(100%, 980px);
  height: 520px;
  position: relative;
  perspective: 1600px;
  display: grid;
  place-items: center;
}

.card {
  position: absolute;
  width: 220px;
  height: 320px;
  border: none;
  background: none;
  padding: 0;
  cursor: grab;
  border-radius: 24px;
  will-change: transform;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  /* Smooth snap-back; overridden during drag */
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 0.35s ease;
}

.card:active,
.card.dragging { cursor: grabbing; }

/* Card face shared */
.card-face {
  position: absolute;
  inset: 0;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.55);
}

.card-front {
  background: linear-gradient(135deg, #ffb6c1 0%, #ff89a5 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: #fff;
}
.card-front::before {
  content: '♠ ♥ ♦ ♣';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.08;
  font-size: 3.2rem;
  letter-spacing: 0.4em;
  pointer-events: none;
}
.card-front span { position: relative; z-index: 1; }

/* ============================================================
   ACTION ROW
   ============================================================ */
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  width: 100%;
  max-width: 720px;
}

/* ============================================================
   POPUP OVERLAY
   ============================================================ */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,6,28,0.82);
  display: grid;
  place-items: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.28s ease, visibility 0.28s ease;
  z-index: 999;
  padding: 1rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  /* Prevent scroll pass-through on iOS */
  overscroll-behavior: contain;
}
.popup-overlay.visible {
  opacity: 1;
  visibility: visible;
}

.popup-content {
  position: relative;
  width: min(100%, 880px);
  max-width: 92vw;
  background: rgba(255,255,255,0.97);
  border-radius: 30px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.popup-image {
  width: 100%;
  height: auto;
  display: block;
  max-height: 72vh;
  object-fit: contain;
  background: #1c0c28;
}

.popup-caption {
  padding: 1rem 1.25rem 1rem;
  font-size: 1rem;
  color: var(--text);
  line-height: 1.7;
  text-align: left;
}

.popup-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  padding: 0 1.25rem 1.25rem;
}

/* Close button */
.popup-close {
  position: absolute;
  top: 0.85rem;
  right: 0.85rem;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  color: #e63f92;
  font-size: 1.4rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease, background 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  z-index: 10;
}
.popup-close:active { transform: scale(0.92); background: rgba(255,182,193,0.3); }
@media (hover: hover) {
  .popup-close:hover { transform: scale(1.08); background: rgba(255,182,193,0.2); }
}
.popup-close:focus-visible {
  outline: 2px solid #FF69B4;
  outline-offset: 2px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 860px) {
  .deck { height: 420px; }
  .card { width: 190px; height: 276px; }
}
@media (max-width: 640px) {
  .page { padding: 1.5rem 1rem 2.5rem; gap: 1rem; }
  .page-title { font-size: 2.6rem; }
  .deck { height: 360px; }
  .card { width: 158px; height: 230px; }
  .card-front::before { font-size: 2.4rem; }
  .actions { gap: 0.75rem; }
  .btn-interactive { width: 100%; }
  .popup-content { width: 95vw; max-width: none; }
  .popup-image { max-height: 50vh; }
  .popup-caption { font-size: 0.9rem; padding: 0.75rem 1rem; }
  .popup-actions { flex-direction: column; }
}
@media (max-width: 480px) {
  .page { padding: 1rem 0.75rem 2rem; }
  .page-title { font-size: 2rem; }
  .description { font-size: 0.95rem; }
  .deck { height: 290px; }
  .card { width: 132px; height: 192px; }
  .card-front::before { font-size: 1.9rem; letter-spacing: 0.25em; }
  .card-front span { font-size: 0.9rem; }
  .popup-image { max-height: 45vh; }
}
</style>
</head>
<body>
  <div class="page">
    <h1 class="page-title">More Memories in Poker Cards</h1>
    <p class="description">Tap any card to reveal the photo. Drag cards to rearrange them — or just enjoy the memories.</p>
    <div class="deck" id="deck"></div>
    <div class="actions">
      <button
        class="btn-interactive btn-secondary"
        id="back-btn"
        type="button"
        aria-label="Back to slideshow"
      >Back to slideshow</button>
      <button
        class="btn-interactive btn-primary"
        id="home-btn"
        type="button"
        aria-label="Return to home page"
      >Return Home</button>
    </div>
  </div>

  <!-- Photo popup -->
  <div class="popup-overlay" id="photo-popup" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="popup-content">
      <button class="popup-close" id="popup-close" type="button" aria-label="Close photo">×</button>
      <img class="popup-image" id="popup-image" src="" alt="">
      <div class="popup-caption" id="popup-caption"></div>
      <div class="popup-actions">
        <button class="btn-interactive btn-ghost" id="popup-return" type="button">
          Return to slideshow
        </button>
      </div>
    </div>
  </div>

<script>
/* ============================================================
   RIPPLE HELPER — works on all .btn-interactive elements
   ============================================================ */
function attachRipple(el) {
  function triggerRipple(x, y) {
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.4;
    const ripple = document.createElement('span');
    ripple.className = 'btn-ripple';
    ripple.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${x - rect.left - size / 2}px;
      top: ${y - rect.top - size / 2}px;
    `;
    el.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
  }

  // Pointer events for unified mouse + touch + stylus
  el.addEventListener('pointerdown', e => {
    if (e.button !== 0 && e.pointerType === 'mouse') return;
    el.dataset.pressed = 'true';
    triggerRipple(e.clientX, e.clientY);
  });
  el.addEventListener('pointerup', () => { el.dataset.pressed = 'false'; });
  el.addEventListener('pointercancel', () => { el.dataset.pressed = 'false'; });
  el.addEventListener('pointerleave', () => { el.dataset.pressed = 'false'; });

  // Keyboard: Space / Enter
  el.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      triggerRipple(rect.left + rect.width / 2, rect.top + rect.height / 2);
      el.click();
    }
  });
}

// Wire up all .btn-interactive elements (including dynamically added ones)
function attachAllRipples() {
  document.querySelectorAll('.btn-interactive').forEach(btn => {
    if (!btn._rippleAttached) {
      attachRipple(btn);
      btn._rippleAttached = true;
    }
  });
}

/* ============================================================
   CARD DATA
   ============================================================ */
const cards = [
  { src: 'images/image13.jpeg', caption: 'A quiet day made unforgettable.' },
  { src: 'images/image14.jpeg', caption: 'Those late-night talks under the stars.' },
  { src: 'images/image15.jpeg', caption: 'Joy in every simple smile.' },
  { src: 'images/image16.jpeg', caption: 'The warmth of your hand in mine.' },
  { src: 'images/image17.jpeg', caption: 'A day full of laughter and light.' },
  { src: 'images/image18.jpeg', caption: 'Tiny moments that meant everything.' },
  { src: 'images/image19.jpeg', caption: 'A perfect memory we will keep forever.' },
  { src: 'images/image20.jpeg', caption: 'Sunsets, stories, and us.' }
];

/* ============================================================
   POPUP LOGIC
   ============================================================ */
const popup     = document.getElementById('photo-popup');
const popupImg  = document.getElementById('popup-image');
const popupCap  = document.getElementById('popup-caption');
const popupClose = document.getElementById('popup-close');
const popupReturn = document.getElementById('popup-return');

let popupOpen = false;

function openPopup(item) {
  popupImg.src   = item.src;
  popupImg.alt   = item.caption;
  popupCap.textContent = item.caption;
  popup.classList.add('visible');
  popup.removeAttribute('aria-hidden');
  document.body.style.overflow = 'hidden';
  popupOpen = true;
  // Focus close button for keyboard users
  requestAnimationFrame(() => popupClose.focus());
}

function closePopup() {
  if (!popupOpen) return;
  popup.classList.remove('visible');
  popup.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  popupOpen = false;
  // Clear src after fade
  setTimeout(() => { if (!popupOpen) popupImg.src = ''; }, 300);
}

// Close on overlay backdrop click (not content)
popup.addEventListener('pointerup', e => {
  if (e.target === popup) closePopup();
});

popupClose.addEventListener('pointerup', e => {
  e.stopPropagation();
  closePopup();
});

popupReturn.addEventListener('pointerup', e => {
  e.stopPropagation();
  closePopup();
  setTimeout(() => { window.location.href = 'newww.html#slideshow'; }, 100);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && popupOpen) closePopup();
});

/* ============================================================
   DECK BUILD
   ============================================================ */
const deck = document.getElementById('deck');
const DRAG_THRESHOLD = 8;

cards.forEach((item, index) => {
  const total   = cards.length;
  const offset  = index - (total - 1) / 2;
  const baseX   = offset * 50;   // px
  const baseRot = offset * 7;    // deg
  const baseZ   = index;

  // Build card element
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `Card ${index + 1}: ${item.caption}`);
  card.style.zIndex = String(baseZ);
  card.innerHTML = `
    <div class="card-face card-front">
      <span>Tap to view ♥</span>
    </div>
  `;

  // Apply base transform
  function applyBaseTransform(extraX = 0, extraY = 0) {
    card.style.transform = `translateX(${baseX + extraX}px) translateY(${extraY}px) rotate(${baseRot}deg)`;
  }
  applyBaseTransform();

  // ─── Drag state ──────────────────────────────────────────
  let startX = 0, startY = 0;
  let dragging = false;
  let dragged  = false;
  let origZ = baseZ;

  function onDown(e) {
    // Only primary button/touch
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.stopPropagation();
    card.setPointerCapture(e.pointerId);
    startX  = e.clientX;
    startY  = e.clientY;
    dragged = false;
    dragging = true;
    origZ = parseInt(card.style.zIndex, 10);
    card.style.zIndex = '20';
    card.style.transition = 'none'; // disable spring during drag
  }

  function onMove(e) {
    if (!dragging) return;
    if (!card.hasPointerCapture(e.pointerId)) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (!dragged && Math.hypot(dx, dy) > DRAG_THRESHOLD) dragged = true;
    if (dragged) {
      card.style.transform = `translateX(${baseX + dx}px) translateY(${dy}px) rotate(${baseRot}deg)`;
    }
  }

  function onUp(e) {
    if (!dragging) return;
    dragging = false;
    if (card.hasPointerCapture(e.pointerId)) card.releasePointerCapture(e.pointerId);

    // Restore transition for snap-back
    card.style.transition = '';
    card.style.zIndex = String(origZ);
    applyBaseTransform(); // snap back

    if (!dragged) {
      // It was a tap — open popup
      openPopup(item);
    }
  }

  card.addEventListener('pointerdown',   onDown);
  card.addEventListener('pointermove',   onMove);
  card.addEventListener('pointerup',     onUp);
  card.addEventListener('pointercancel', onUp);

  // Keyboard activation
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openPopup(item);
    }
  });

  // Hover lift — desktop only
  card.addEventListener('mouseenter', () => {
    if (!dragging) {
      card.style.zIndex = String(total + 5);
      card.style.transform = `translateX(${baseX}px) translateY(-14px) rotate(${baseRot}deg) scale(1.04)`;
    }
  });
  card.addEventListener('mouseleave', () => {
    if (!dragging) {
      card.style.zIndex = String(origZ);
      applyBaseTransform();
    }
  });

  deck.appendChild(card);
});

/* ============================================================
   NAVIGATION BUTTONS
   ============================================================ */
document.getElementById('back-btn').addEventListener('pointerup', e => {
  e.preventDefault();
  window.location.href = 'newww.html#slideshow';
});

document.getElementById('home-btn').addEventListener('pointerup', e => {
  e.preventDefault();
  window.location.href = 'newww.html';
});

/* ============================================================
   ATTACH RIPPLES TO ALL INTERACTIVE BUTTONS
   ============================================================ */
attachAllRipples();
// Also attach ripple to popup close (not .btn-interactive but still interactive)
attachRipple(popupClose);
</script>
</body>
</html>
